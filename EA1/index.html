<!DOCTYPE html>
<html lang="en">

<head>

  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@300;400&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.12/lib/addons/p5.sound.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

  <script src="https://cdn.plot.ly/plotly-3.4.0.min.js" charset="utf-8"></script>
  <script src="sketch.js"></script>

  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

</head>

<body>

  <div class="page">

    <header>
      <h1>Image Classifier</h1>
      <p>Felix Kölle</p>
    </header>

    <div class="section">
      <div class="section-header">
        <h2>Vorklassifizierte Bilder</h2>
        <span>Klassifizierungen</span>
      </div>
      <div class="group-label">Good</div>
      <div id="results-good"></div>
      <div class="group-label">Bad</div>
      <div id="results-bad"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Eigene Klassifizierung</h2>
        <span>Drag &amp; Drop</span>
      </div>
      <div id="canvas-wrapper">
        <p class="canvas-hint">Bilddatei auf die Fläche ziehen</p>
      </div>
      <div id="uploadedImages"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <h2>Dokumentation</h2>
        <span>Dokumentation</span>
      </div>
      <div>
        <p>
          XXX - Dokumentation
        </p>
      </div>
    </div>



  </div>

</body>

</html>
